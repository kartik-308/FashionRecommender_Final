<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/auth.css" />
</head>
<body class="auth-body">

  <div class="landing-wrap">

    <div class="landing-logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Fashion<strong>Finder</strong></span>
    </div>
    <p class="landing-tagline">AI-powered fashion recommendations</p>

    <div class="landing-cards">

      <a href="/login/user" class="landing-card landing-card--user">
        <div class="landing-card__icon">👗</div>
        <div class="landing-card__body">
          <span class="landing-card__title">User</span>
          <span class="landing-card__desc">Browse &amp; discover fashion</span>
        </div>
        <span class="landing-card__arrow">→</span>
      </a>

      <a href="/login/admin" class="landing-card landing-card--admin">
        <div class="landing-card__icon">🛡</div>
        <div class="landing-card__body">
          <span class="landing-card__title">Admin</span>
          <span class="landing-card__desc">Manage users &amp; datasets</span>
        </div>
        <span class="landing-card__arrow">→</span>
      </a>

    </div>
  </div>

</body>
</html>
