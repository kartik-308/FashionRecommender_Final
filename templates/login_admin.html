<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion Finder — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-card auth-card--admin">
    <a href="/login" class="auth-back">← Back</a>

    <div class="auth-logo">
      <span class="logo-icon" style="color:var(--amber)">🛡</span>
      <span class="logo-text">Admin<strong>Portal</strong></span>
    </div>

    {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}

    <form class="auth-form" method="POST" action="/login/admin">
      <input type="hidden" name="action" value="login" />
      <div class="auth-field">
        <label class="label">Admin Username</label>
        <input class="auth-input" type="text" name="username" placeholder="admin" required />
      </div>
      <div class="auth-field">
        <label class="label">Password</label>
        <input class="auth-input" type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn--primary btn--admin-submit">Sign In</button>
    </form>

    <p class="auth-hint">Admin accounts are created by an existing administrator.</p>
  </div>

</body>
</html>
